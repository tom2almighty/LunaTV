name: CI & Docker

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - '!.github/workflows/**'
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write       # cosign keyless OIDC
  attestations: write   # SLSA provenance

env:
  REGISTRY: ghcr.io

jobs:
  # ───────────────────────────────────────────────────────────────
  # Job 1 — type-check + frontend build verification.
  # Runs on every push and PR; the docker job depends on it,
  # so a typecheck/build failure short-circuits the whole pipeline.
  # ───────────────────────────────────────────────────────────────
  verify:
    name: Type-check & build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck

      - name: Build (Vite)
        run: pnpm build

  # ───────────────────────────────────────────────────────────────
  # Job 2 — multi-arch Docker build, push, sign.
  # Skipped on PRs (no registry pollution from forks).
  # Only runs on main/master so :latest is always the default branch.
  # ───────────────────────────────────────────────────────────────
  docker:
    name: Docker build, push, sign
    needs: verify
    if: >-
      github.event_name != 'pull_request' &&
      contains(fromJSON('["refs/heads/main", "refs/heads/master"]'), github.ref)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=${{ env.REGISTRY }}/${owner}/lunatv" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (cosign keyless)
        env:
          IMAGE: ${{ steps.img.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        # Sign by digest — covers the multi-arch manifest, so all
        # platform-specific images under it inherit the signature.
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Inspect manifest
        env:
          IMAGE: ${{ steps.img.outputs.name }}
        run: docker buildx imagetools inspect "${IMAGE}:latest"

      - name: Job summary
        env:
          IMAGE: ${{ steps.img.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Image published"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${IMAGE}:latest\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo "| Platforms | linux/amd64, linux/arm64 |"
            echo "| Pull | \`docker pull ${IMAGE}:latest\` |"
            echo "| Signed | cosign keyless (OIDC) |"
            echo "| SBOM | embedded |"
            echo "| Provenance | SLSA mode=max |"
          } >> "$GITHUB_STEP_SUMMARY"
